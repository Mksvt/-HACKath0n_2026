services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./backend/data:/app/data
    environment:
      - PYTHONPATH=/app
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        BACKEND_INTERNAL_URL: http://backend:8000
    environment:
      - NEXT_PUBLIC_CESIUM_BASE_URL=https://cdn.jsdelivr.net/npm/cesium@1.120.0/Build/Cesium/
    ports:
      - '3000:3000'
    depends_on:
      - backend
